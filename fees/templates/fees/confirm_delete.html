{% extends 'base.html' %}
{% block title %}Delete {{ type }}{% endblock %}
{% block page_title %}Delete {{ type }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="ep-card text-center">
      <div style="width:64px; height:64px; background:#ffeef0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 20px;">
        🗑️
      </div>
      <h5 style="font-weight:800; margin-bottom:8px;">Delete {{ type }}</h5>
      <p style="color:#6b7c93; font-size:14px; margin-bottom:24px;">
        Are you sure you want to delete <strong style="color:#0d1b2a;">{{ object }}</strong>?<br>
        <span style="color:#e53935;">This action cannot be undone.</span>
      </p>

      <form method="post" class="d-flex gap-3 justify-content-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4" style="border-radius:8px; font-weight:700;">
          <i class="bi bi-trash me-1"></i> Yes, Delete
        </button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4" style="border-radius:8px; font-weight:600;">
          Cancel
        </a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
